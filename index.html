<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>時計</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts ("Inter" を導入して超極細デジタル数字を最高に美しく描画) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="時計">
  <link class="apple-touch-icon" href="icon-192.png">

  <style>
    /* iOS Safari / PWAスタンドアロン時の高さバグを100%駆逐する fixed-inset 構成 */
    html, body {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: #ffffff;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.025em;
    }

    /* iOS純正の極薄かつ美しい数字表示 (等幅仕様でブレを完璧防止) */
    .tabular-timer {
      font-family: "Inter", "SF Pro Display", -apple-system, sans-serif;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" on;
      font-weight: 100; /* 超極薄に設定 */
      letter-spacing: -0.05em; /* 文字間隔を本物同様にタイトに調整 */
    }

    /* iOS 3D風ドラムロールピッカー */
    .picker-viewport {
      height: 180px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000000;
    }

    .picker-column {
      width: 100px; /* 単位が右側に綺麗に収まるよう幅を最適化 */
      height: 180px;
      position: relative;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      z-index: 2;
    }
    .picker-column::-webkit-scrollbar {
      display: none;
    }

    .picker-scroller {
      padding-top: 70px;
      padding-bottom: 70px;
    }

    .picker-val-item {
      height: 40px;
      line-height: 40px;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      font-weight: 300;
      color: #8e8e93;
      transition: transform 0.15s ease-out, color 0.15s ease-out;
      white-space: nowrap;
    }

    .picker-val-item.active {
      color: #ffffff;
      font-weight: 500;
      transform: scale(1.15);
    }

    /* ピッカーの上下グラデーションと境界インディケータ */
    .picker-overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 60%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    .picker-overlay-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 60%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      z-index: 10;
    }
    .picker-center-indicator {
      position: absolute;
      top: 70px;
      left: 8px;
      right: 8px;
      height: 40px;
      border-top: 0.5px solid rgba(255, 255, 255, 0.12);
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
      z-index: 5;
    }

    /* iOS丸型ボタン */
    .ios-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 500;
      transition: background-color 0.12s ease, transform 0.05s ease;
      position: relative;
    }
    .ios-btn:active {
      transform: scale(0.95);
    }
    .ios-btn::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      border: 1.5px solid rgba(0, 0, 0, 0.35);
    }

    .btn-gray-active {
      background-color: #1c1c1e;
      color: #ffffff;
    }
    .btn-gray-disabled {
      background-color: #151517;
      color: #555555;
    }
    .btn-green-start {
      background-color: #082411;
      color: #2fdf5a;
    }
    .btn-red-stop {
      background-color: #32080a;
      color: #ff3b30;
    }
    .btn-orange-pause {
      background-color: #331400;
      color: #ff9500;
    }

    /* スイッチトグル */
    .ios-switch {
      width: 51px;
      height: 31px;
      background-color: #2c2c2e;
      border-radius: 100px;
      position: relative;
      transition: background-color 0.2s ease;
      cursor: pointer;
    }
    .ios-switch.active {
      background-color: #34c759;
    }
    .ios-switch-handle {
      width: 27px;
      height: 27px;
      background-color: #ffffff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }
    .ios-switch.active .ios-switch-handle {
      transform: translateX(20px);
    }

    /* iOS本物基準の極薄ナビゲーションバー（二重パディングバグを完璧防止） */
    .ios-navbar {
      border-top: 0.5px solid rgba(255, 255, 255, 0.1);
      background-color: rgba(22, 22, 22, 0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding-top: 6px;
      /* ノッチあり＝env()の値、ノッチなし＝安全なフォールバック12pxを自動判別 */
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .safe-pt { padding-top: env(safe-area-inset-top, 24px); }
  </style>
</head>
<body class="flex flex-col h-full justify-between safe-pt">

  <!-- ================= TOP HEADER ================= -->
  <header class="flex justify-between items-center px-6 pt-4 pb-1">
    <div class="flex-1"></div>
    <!-- アラーム画面でのみ右上にプラスボタンを表示 -->
    <button id="header-btn-add-alarm" class="hidden text-orange-500 hover:opacity-80 active:scale-95 transition-all" onclick="openAlarmAddMenu(event)">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
    </button>
    <button id="pwa-install-btn" class="hidden text-orange-500 text-sm font-semibold flex items-center gap-1 bg-neutral-950 px-3 py-1.5 rounded-full border border-neutral-800">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      <span>ホームに追加</span>
    </button>
  </header>

  <!-- ================= MAIN VIEWS ================= -->
  <main id="main-content" class="flex-1 flex flex-col justify-center px-6 overflow-hidden relative">
    
    <!-- 1. WORLD CLOCK VIEW -->
    <div id="view-world" class="hidden flex-col flex-1 justify-start py-4 overflow-y-auto no-scrollbar transition-all duration-300">
      <div class="divide-y divide-neutral-800" id="world-clock-list">
        <!-- 東京 -->
        <div class="flex justify-between items-center py-4">
          <div>
            <div class="text-neutral-400 text-xs font-normal">今日, +0時間</div>
            <div class="text-white text-2xl font-medium mt-0.5">東京</div>
          </div>
          <div class="text-right">
            <span id="world-time-tokyo" class="text-5xl font-light tracking-tighter tabular-timer">0:00</span>
          </div>
        </div>
        <!-- クパチーノ -->
        <div class="flex justify-between items-center py-4">
          <div>
            <div id="world-diff-cupertino" class="text-neutral-400 text-xs font-normal">今日, -17時間</div>
            <div class="text-white text-2xl font-medium mt-0.5">クパチーノ</div>
          </div>
          <div class="text-right">
            <span id="world-time-cupertino" class="text-5xl font-light tracking-tighter tabular-timer">0:00</span>
          </div>
        </div>
        <!-- ロンドン -->
        <div class="flex justify-between items-center py-4">
          <div>
            <div id="world-diff-london" class="text-neutral-400 text-xs font-normal">今日, -8時間</div>
            <div class="text-white text-2xl font-medium mt-0.5">ロンドン</div>
          </div>
          <div class="text-right">
            <span id="world-time-london" class="text-5xl font-light tracking-tighter tabular-timer">0:00</span>
          </div>
        </div>
        <!-- ニューヨーク -->
        <div class="flex justify-between items-center py-4">
          <div>
            <div id="world-diff-newyork" class="text-neutral-400 text-xs font-normal">今日, -13時間</div>
            <div class="text-white text-2xl font-medium mt-0.5">ニューヨーク</div>
          </div>
          <div class="text-right">
            <span id="world-time-newyork" class="text-5xl font-light tracking-tighter tabular-timer">0:00</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. ALARM VIEW -->
    <div id="view-alarm" class="hidden flex-col flex-1 justify-start py-4 overflow-y-auto no-scrollbar transition-all duration-300">
      <div id="alarm-list-container" class="divide-y divide-neutral-800">
        <!-- アラームが動的に追加されます -->
      </div>
      <!-- 空白時のプレースホルダー -->
      <div id="alarm-empty-placeholder" class="hidden flex-1 flex-col justify-center items-center text-center py-10">
        <svg class="w-14 h-14 text-neutral-800 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="13" r="8" /><path d="M12 9v4l2 2" /><path d="M5 3L2 6" /><path d="M19 3l3 3" />
        </svg>
        <div class="text-neutral-500 text-lg font-medium">アラームはありません</div>
        <p class="text-neutral-600 text-xs mt-1">右上の「＋」からアラームを追加できます</p>
      </div>
    </div>

    <!-- 3. TIMER VIEW -->
    <div id="view-timer" class="flex flex-col flex-1 justify-between py-2 transition-all duration-300">
      
      <!-- A. 新規作成用 ドラムロールピッカー画面 -->
      <div id="timer-setup-panel" class="flex-1 flex flex-col justify-center">
        <div class="picker-viewport w-full max-w-sm mx-auto">
          <div class="picker-center-indicator"></div>
          <div class="picker-overlay-top"></div>
          <div class="picker-overlay-bottom"></div>

          <div class="flex justify-center items-center w-full h-full">
            <!-- Hours (一桁フォーマット表示) -->
            <div class="flex items-center relative h-[180px]">
              <div id="col-hours" class="picker-column" onscroll="onPickerScroll(this, 'hours')">
                <div class="picker-scroller" id="scroller-hours"></div>
              </div>
            </div>

            <!-- Minutes -->
            <div class="flex items-center relative h-[180px] ml-1">
              <div id="col-minutes" class="picker-column" onscroll="onPickerScroll(this, 'minutes')">
                <div class="picker-scroller" id="scroller-minutes"></div>
              </div>
            </div>

            <!-- Seconds -->
            <div class="flex items-center relative h-[180px] ml-1">
              <div id="col-seconds" class="picker-column" onscroll="onPickerScroll(this, 'seconds')">
                <div class="picker-scroller" id="scroller-seconds"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Details Options Box -->
        <div class="mt-6 max-w-sm mx-auto w-full space-y-2 px-2">
          <div class="flex justify-between items-center bg-[#1c1c1e] p-3.5 rounded-xl cursor-pointer active:brightness-90" onclick="openLabelMenu(event)">
            <span class="text-neutral-200 text-[15px]">ラベル</span>
            <div class="flex items-center gap-1 text-orange-500">
              <span id="label-display" class="text-[15px]">タイマー</span>
              <svg class="w-4 h-4 text-neutral-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
            </div>
          </div>
          <div class="flex justify-between items-center bg-[#1c1c1e] p-3.5 rounded-xl cursor-pointer active:brightness-90" onclick="openSoundMenu(event)">
            <span class="text-neutral-200 text-[15px]">タイマー終了時</span>
            <div class="flex items-center gap-1 text-neutral-500">
              <span id="label-selected-sound" class="text-[15px]">レーダー</span>
              <svg class="w-4 h-4 text-neutral-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
            </div>
          </div>
        </div>

        <!-- 操作コントロール -->
        <div class="flex justify-between items-center px-4 max-w-sm mx-auto w-full pt-8">
          <button id="timer-btn-cancel-inactive" disabled class="ios-btn btn-gray-disabled">キャンセル</button>
          <button id="timer-btn-start" class="ios-btn btn-green-start">開始</button>
        </div>
      </div>

      <!-- B. 単体タイマー稼働中表示 (IMG_0639.png 完璧再現) -->
      <div id="timer-running-single-panel" class="hidden flex-1 flex flex-col justify-center items-center">
        <!-- 円形インディケータ -->
        <div class="relative w-76 h-72 md:w-80 md:h-80 flex items-center justify-center">
          <svg class="absolute top-0 left-0 w-full h-full" viewBox="0 0 220 220">
            <circle cx="110" cy="110" r="105" fill="transparent" stroke="#1c1c1e" stroke-width="1.2" />
            <circle id="timer-ring" class="progress-ring-circle" cx="110" cy="110" r="105" fill="transparent" stroke="#ff9500" stroke-width="1.8" stroke-dasharray="659.7" stroke-dashoffset="0" stroke-linecap="round" />
          </svg>
          <div class="flex flex-col items-center justify-center z-10 text-center">
            <!-- タイマー稼働中用のラベル名 -->
            <span id="timer-running-title" class="text-[#8e8e93] text-sm font-normal tracking-wide mb-1 select-none">タイマー</span>
            <!-- 究極に美しく細いフォントで、ブレない残り時間表示 -->
            <span id="timer-countdown" class="text-6xl font-thin tracking-tight tabular-timer text-white">4:59</span>
            <div class="flex items-center gap-1 text-[15px] text-[#8e8e93] mt-2 font-normal">
              <!-- ベルアイコン -->
              <svg class="w-3.5 h-3.5 fill-current text-[#8e8e93]" viewBox="0 0 24 24">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
              </svg>
              <span id="timer-finish-eta">22:49</span>
            </div>
            
            <!-- Picture-in-Picture 小窓表示ボタン -->
            <button id="btn-pip" class="mt-4 px-3.5 py-1.5 bg-[#1c1c1e] hover:bg-[#2c2c2e] border border-neutral-800 rounded-full text-[11px] font-semibold text-orange-500 flex items-center gap-1 active:scale-95 transition-all shadow-md">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0v8m0-8L8 15M4 19h4a2 2 0 002-2v-4a2 2 0 00-2-2H4a2 2 0 00-2 2v4a2 2 0 002 2z"/>
              </svg>
              <span>小窓で表示 (PiP)</span>
            </button>
          </div>
        </div>

        <!-- 操作コントロール -->
        <div class="flex justify-between items-center px-4 max-w-sm mx-auto w-full pt-8">
          <button id="timer-btn-cancel-active" class="ios-btn btn-gray-active">キャンセル</button>
          <button id="timer-btn-pause-resume" class="ios-btn btn-orange-pause">一時停止</button>
        </div>

        <!-- 終了時設定カード -->
        <div class="mt-8 max-w-sm mx-auto w-full px-2">
          <div class="flex justify-between items-center bg-[#1c1c1e] p-3.5 rounded-xl cursor-pointer active:brightness-90" onclick="openSoundMenu(event)">
            <span class="text-neutral-200 text-[15px]">タイマー終了時</span>
            <div class="flex items-center gap-1 text-neutral-500">
              <span id="label-selected-sound-running" class="text-[15px]">レーダー</span>
              <svg class="w-4 h-4 text-neutral-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
            </div>
          </div>
        </div>
      </div>

      <!-- C. 複数タイマー稼旧中リストビュー -->
      <div id="timers-active-container" class="hidden flex-1 flex flex-col justify-start overflow-y-auto no-scrollbar mt-4 max-h-[340px]">
        <div class="text-[12px] text-neutral-500 font-bold tracking-wider uppercase mb-2 px-2">実行中のタイマー</div>
        <div id="active-timers-list" class="space-y-2.5 px-1">
          <!-- 実行中タイマー行 -->
        </div>
      </div>

      <!-- 下部の履歴お気に入りボックス -->
      <div id="timer-history-container" class="max-w-sm mx-auto w-full mt-4">
        <div class="text-[11px] text-neutral-500 font-bold tracking-wider uppercase mb-2 px-1">最近の項目</div>
        <div id="timer-history-list" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar"></div>
      </div>
    </div>

    <!-- 4. STOPWATCH VIEW -->
    <div id="view-stopwatch" class="hidden flex-col flex-1 justify-between py-4 transition-all duration-300">
      <div id="stopwatch-display-wrapper" class="flex-1 flex flex-col justify-center items-center cursor-pointer" onclick="toggleStopwatchDisplayMode()">
        <!-- Digital Face -->
        <div id="sw-digital-face" class="flex flex-col items-center justify-center">
          <div class="text-7xl font-extralight tracking-tighter tabular-timer flex items-baseline select-none">
            <span id="sw-time-main" class="tabular-timer">00:00.</span>
            <span id="sw-time-ms" class="text-5xl font-extralight text-neutral-300 ml-0.5 tabular-timer">00</span>
          </div>
          <span class="text-xs text-neutral-500 mt-4 uppercase tracking-widest font-semibold">タップで盤面を切り替え</span>
        </div>

        <!-- Analog Face (Vector Perfect SVG) -->
        <div id="sw-analog-face" class="hidden relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center mx-auto">
          <svg id="sw-analog-svg" class="w-full h-full max-w-[280px] max-h-[280px]" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="96" fill="#000000" stroke="#1c1c1e" stroke-width="2"/>
            <g stroke="#2c2c2e" stroke-width="1" stroke-linecap="round">
              <line x1="100" y1="8" x2="100" y2="16" stroke="#ffffff" stroke-width="1.5"/>
              <line x1="100" y1="184" x2="100" y2="192" stroke="#555555"/>
              <line x1="8" y1="100" x2="16" y2="100" stroke="#555555"/>
              <line x1="184" y1="100" x2="192" y2="100" stroke="#555555"/>
              <line x1="164.6" y1="164.6" x2="159" y2="159"/>
              <line x1="35.4" y1="35.4" x2="41" y2="41"/>
              <line x1="164.6" y1="35.4" x2="159" y2="41"/>
              <line x1="35.4" y1="145" x2="41" y2="139"/>
            </g>

            <text x="100" y="28" font-size="12" font-weight="600" fill="#aeaeae" text-anchor="middle">60</text>
            <text x="100" y="182" font-size="12" font-weight="600" fill="#aeaeae" text-anchor="middle">30</text>
            <text x="175" y="104" font-size="12" font-weight="600" fill="#aeaeae" text-anchor="middle">15</text>
            <text x="25" y="104" font-size="12" font-weight="600" fill="#aeaeae" text-anchor="middle">45</text>

            <g>
              <circle cx="100" cy="62" r="22" fill="none" stroke="#1c1c1e" stroke-width="1"/>
              <line x1="100" y1="40" x2="100" y2="44" stroke="#555555" stroke-width="1"/>
              <line x1="100" y1="80" x2="100" y2="84" stroke="#555555" stroke-width="1"/>
              <text x="100" y="52" font-size="7" fill="#8e8e93" text-anchor="middle">30</text>
              <line id="svg-hand-sub-minutes" x1="100" y1="62" x2="100" y2="44" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round" transform="rotate(0, 100, 62)"/>
              <circle cx="100" cy="62" r="2" fill="#ff9500"/>
            </g>

            <g id="svg-hand-seconds-group" transform="rotate(0, 100, 100)">
              <line x1="100" y1="116" x2="100" y2="10" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="100" cy="110" r="3" fill="#ff9500"/>
            </g>
            <circle cx="100" cy="100" r="4" fill="#ffffff" stroke="#000000" stroke-width="1"/>
          </svg>

  <!-- ================= SOUNDS SYNTHESIZER AND OPERATIONAL AUDIO ================= -->
  <script>
    let audioCtx = null;
    let alertLoopInterval = null;

    // ★安全なAudioContext初期化 (例外保護によりブラウザやiframeのセキュリティ制限によるクラッシュを100%防止)
    function initAudio() {
      try {
        if (!audioCtx) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass) {
            audioCtx = new AudioContextClass();
          }
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      } catch (e) {
        console.warn("AudioContext initialization bypassed safely for PWA standard:", e);
      }
    }

    function playHapticTick() {
      try {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(320, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.015);

        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.015);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.015);
      } catch (e) {
        console.warn("Audio feedback block:", e);
      }
    }

    const INSTRUMENT_SOUNDS = {
      radar: {
        name: "レーダー (デフォルト)",
        play: () => {
          if (!audioCtx) return;
          const now = audioCtx.currentTime;
          playPerfectChime(880.00, 0.08, now, 0.25); 
          playPerfectChime(880.00, 0.08, now + 0.12, 0.25); 
          playPerfectChime(1318.51, 0.18, now + 0.24, 0.35); 
        }
      },
      chime: {
        name: "美しいチャイム",
        play: () => {
          if (!audioCtx) return;
          const now = audioCtx.currentTime;
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((f, i) => {
            playPerfectChime(f, 0.6, now + (i * 0.07), 0.2);
          });
        }
      },
      uplift: {
        name: "アップリフト",
        play: () => {
          if (!audioCtx) return;
          const now = audioCtx.currentTime;
          const notes = [440.00, 554.37, 659.25, 880.00];
          notes.forEach((f, i) => {
            playPerfectChime(f, 0.4, now + (i * 0.05), 0.2);
          });
        }
      }
    };

    let selectedSoundKey = 'radar';

    function playPerfectChime(freq, duration, startTime, vol) {
      try {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        gainNode.gain.setValueAtTime(vol, startTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
        osc.start(startTime);
        osc.stop(startTime + duration);
      } catch (e) {}
    }

    function startLoopingAlertSound() {
      initAudio();
      if (alertLoopInterval) clearInterval(alertLoopInterval);
      if (audioCtx) {
        INSTRUMENT_SOUNDS[selectedSoundKey].play();
        alertLoopInterval = setInterval(() => {
          INSTRUMENT_SOUNDS[selectedSoundKey].play();
        }, 1600);
      }
    }

    function stopLoopingAlertSound() {
      if (alertLoopInterval) {
        clearInterval(alertLoopInterval);
        alertLoopInterval = null;
      }
    }
  </script>

  <!-- ================= SYSTEM VIEWS AND MAIN TABS LOGIC ================= -->
  <script>
    const tabWorld = document.getElementById('tab-world');
    const tabAlarm = document.getElementById('tab-alarm');
    const tabSW = document.getElementById('tab-sw');
    const tabTimer = document.getElementById('tab-timer');
    const headerBtnAddAlarm = document.getElementById('header-btn-add-alarm');

    const viewWorld = document.getElementById('view-world');
    const viewAlarm = document.getElementById('view-alarm');
    const viewTimer = document.getElementById('view-timer');
    const viewStopwatch = document.getElementById('view-stopwatch');

    let activeTab = 'timer';

    function switchTab(targetTab) {
      initAudio();
      playHapticTick();
      activeTab = targetTab;
      
      tabWorld.className = "flex flex-col items-center text-neutral-600 focus:outline-none transition-colors duration-200";
      tabAlarm.className = "flex flex-col items-center text-neutral-600 focus:outline-none transition-colors duration-200";
      tabSW.className = "flex flex-col items-center text-neutral-600 focus:outline-none transition-colors duration-200";
      tabTimer.className = "flex flex-col items-center text-neutral-600 focus:outline-none transition-colors duration-200";

      viewWorld.classList.add('hidden'); viewWorld.classList.remove('flex');
      viewAlarm.classList.add('hidden'); viewAlarm.classList.remove('flex');
      viewTimer.classList.add('hidden');
      viewStopwatch.classList.add('hidden'); viewStopwatch.classList.remove('flex');

      headerBtnAddAlarm.classList.add('hidden'); 
      stopSwRenderLoop(); 

      if (targetTab === 'world') {
        tabWorld.classList.add('text-orange-500'); tabWorld.classList.remove('text-neutral-600');
        viewWorld.classList.remove('hidden'); viewWorld.classList.add('flex');
        startWorldClockUpdate();
      } else if (targetTab === 'alarm') {
        tabAlarm.classList.add('text-orange-500'); tabAlarm.classList.remove('text-neutral-600');
        viewAlarm.classList.remove('hidden'); viewAlarm.classList.add('flex');
        headerBtnAddAlarm.classList.remove('hidden'); 
        renderAlarmList();
      } else if (targetTab === 'stopwatch') {
        tabSW.classList.add('text-orange-500'); tabSW.classList.remove('text-neutral-600');
        viewStopwatch.classList.remove('hidden'); viewStopwatch.classList.add('flex');
        if (swState === 'running') startSwRenderLoop();
        else updateStopwatchTimer();
      } else if (targetTab === 'timer') {
        tabTimer.classList.add('text-orange-500'); tabTimer.classList.remove('text-neutral-600');
        viewTimer.classList.remove('hidden');
      }
    }

    tabWorld.addEventListener('click', () => switchTab('world'));
    tabAlarm.addEventListener('click', () => switchTab('alarm'));
    tabSW.addEventListener('click', () => switchTab('stopwatch'));
    tabTimer.addEventListener('click', () => switchTab('timer'));

    // 世界時計 (24時間表記に完全同期)
    let worldClockInterval = null;
    function startWorldClockUpdate() {
      if (worldClockInterval) clearInterval(worldClockInterval);
      function update() {
        const now = new Date();
        const options = { hour: '2-digit', minute: '2-digit', hour12: false };
        
        const tokyoStr = now.toLocaleTimeString('ja-JP', { ...options, timeZone: 'Asia/Tokyo' });
        const cupertinoStr = now.toLocaleTimeString('ja-JP', { ...options, timeZone: 'America/Los_Angeles' });
        const londonStr = now.toLocaleTimeString('ja-JP', { ...options, timeZone: 'Europe/London' });
        const newyorkStr = now.toLocaleTimeString('ja-JP', { ...options, timeZone: 'America/New_York' });

        function setCityTime(city, timeStr) {
          const timeElem = document.getElementById(`world-time-${city}`);
          if (timeElem) timeElem.textContent = timeStr;
        }

        setCityTime('tokyo', tokyoStr);
        setCityTime('cupertino', cupertinoStr);
        setCityTime('london', londonStr);
        setCityTime('newyork', newyorkStr);
      }
      update();
      worldClockInterval = setInterval(update, 1000);
    }

    // ================= ALARM CONTROLLER (アラーム管理システム) =================
    let savedAlarms = [];
    let selectedAlarmDays = [false, false, false, false, false, false, false]; // 月[0]〜日[6]

    function openAlarmAddMenu(event) {
      if (event) {
        event.stopPropagation();
        event.preventDefault();
      }
      playHapticTick();

      // 繰り返し曜日選択ボタンのスタイルをすべてオフにリセット
      selectedAlarmDays = [false, false, false, false, false, false, false];
      document.querySelectorAll('.alarm-day-btn').forEach(btn => {
        btn.classList.remove('bg-orange-500', 'text-white');
        btn.classList.add('bg-[#2c2c2e]', 'text-neutral-300');
      });
      
      // 時間と分のセレクトボックスを初期化
      const hrSelect = document.getElementById('alarm-add-hour');
      const minSelect = document.getElementById('alarm-add-minute');
      hrSelect.innerHTML = '';
      minSelect.innerHTML = '';
      
      for(let i=0; i<24; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = String(i).padStart(2, '0');
        hrSelect.appendChild(opt);
      }
      for(let i=0; i<60; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = String(i).padStart(2, '0');
        minSelect.appendChild(opt);
      }

      const modal = document.getElementById('modal-alarm-add');
      const inner = modal.querySelector('div');
      modal.classList.remove('pointer-events-none', 'opacity-0');
      inner.classList.remove('translate-y-full');
    }

    function closeAlarmAddMenu() {
      playHapticTick();
      const modal = document.getElementById('modal-alarm-add');
      const inner = modal.querySelector('div');
      modal.classList.add('opacity-0', 'pointer-events-none');
      inner.classList.add('translate-y-full');
    }

    // アラーム保存処理 (繰り返し曜日配列を完全に記録)
    function saveNewAlarm() {
      const hr = document.getElementById('alarm-add-hour').value;
      const min = document.getElementById('alarm-add-minute').value;
      
      const newAlarm = {
        id: Date.now(),
        timeStr: `${String(hr).padStart(2, '0')}:${String(min).padStart(2, '0')}`,
        active: true,
        days: [...selectedAlarmDays] // 曜日配列のディープコピー
      };

      savedAlarms.push(newAlarm);
      closeAlarmAddMenu();
      renderAlarmList();
    }

    // 繰り返し曜日配列を本物の日本語スケジュールテキストに翻訳するヘルパー関数
    function getRepeatDaysText(daysArray) {
      if (!daysArray) return '1回限り';
      const dayNames = ['月', '火', '水', '木', '金', '土', '日'];
      const selectedDays = [];
      daysArray.forEach((selected, idx) => {
        if (selected) {
          selectedDays.push(dayNames[idx]);
        }
      });

      if (selectedDays.length === 0) return '1回限り';
      if (selectedDays.length === 7) return '毎日';
      // 平日のみのチェック (月〜金がすべてtrue、土日だけがfalse)
      if (selectedDays.length === 5 && daysArray[0] && daysArray[1] && daysArray[2] && daysArray[3] && daysArray[4] && !daysArray[5] && !daysArray[6]) return '平日';
      // 週末のみのチェック (土日がtrue、それ以外がfalse)
      if (selectedDays.length === 2 && daysArray[5] && daysArray[6] && !daysArray[0] && !daysArray[1] && !daysArray[2] && !daysArray[3] && !daysArray[4]) return '週末';
      
      return selectedDays.join(' ');
    }

    function renderAlarmList() {
      const container = document.getElementById('alarm-list-container');
      const placeholder = document.getElementById('alarm-empty-placeholder');
      
      // バグ回避のためのNull安全処理
      if (!container || !placeholder) return;
      
      container.innerHTML = '';

      if (savedAlarms.length === 0) {
        placeholder.classList.remove('hidden');
        placeholder.classList.add('flex');
        return;
      } else {
        placeholder.classList.add('hidden');
        placeholder.classList.remove('flex');
      }

      savedAlarms.forEach(alarm => {
        const repeatText = getRepeatDaysText(alarm.days);
        const row = document.createElement('div');
        row.className = "flex justify-between items-center py-4 border-b border-neutral-900";
        row.innerHTML = `
          <div>
            <div class="text-5xl font-light tracking-tighter tabular-timer ${alarm.active ? 'text-neutral-200' : 'text-neutral-500'}">${alarm.timeStr}</div>
            <div class="text-neutral-400 text-xs mt-1">アラーム, ${repeatText}</div>
          </div>
          <div class="flex items-center gap-3">
            <div class="ios-switch ${alarm.active ? 'active' : ''}" onclick="toggleAlarmActive(${alarm.id}, this)">
              <div class="ios-switch-handle"></div>
            </div>
            <button onclick="deleteAlarm(${alarm.id})" class="text-neutral-600 hover:text-red-500 active:scale-90 transition-all p-1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>
        `;
        container.appendChild(row);
      });
    }

    window.toggleAlarmActive = function(id, el) {
      playHapticTick();
      const alarm = savedAlarms.find(x => x.id === id);
      if (alarm) {
        alarm.active = !alarm.active;
        el.classList.toggle('active');
        const timeText = el.parentNode.previousElementSibling.querySelector('.tabular-timer');
        if (alarm.active) {
          timeText.classList.remove('text-neutral-500');
          timeText.classList.add('text-neutral-200');
        } else {
          timeText.classList.remove('text-neutral-200');
          timeText.classList.add('text-neutral-500');
        }
      }
    };

    window.deleteAlarm = function(id) {
      playHapticTick();
      savedAlarms = savedAlarms.filter(x => x.id !== id);
      renderAlarmList();
    };

    // ================= MULTI-TIMER CONTROLLER =================
    let activeTimers = []; 
    let timerGlobalId = 0;
    let timerTickerId = null;

    let selHours = 0;
    let selMinutes = 5; 
    let selSeconds = 0;
    let recentTimersList = [];
    let scrollDebounceTimer = null;

    const tPanelSetup = document.getElementById('timer-setup-panel');
    const tPanelRunningSingle = document.getElementById('timer-running-single-panel');
    const tBtnStart = document.getElementById('timer-btn-start');
    const tBtnCancelInactive = document.getElementById('timer-btn-cancel-inactive');
    const tBtnCancelActive = document.getElementById('timer-btn-cancel-active');
    const tBtnPauseResume = document.getElementById('timer-btn-pause-resume');
    
    const tCountdown = document.getElementById('timer-countdown');
    const tEta = document.getElementById('timer-finish-eta');
    const tRing = document.getElementById('timer-ring');
    const tLabelInput = document.getElementById('input-timer-label');
    const tLabelDisplay = document.getElementById('label-display');
    const tHistoryList = document.getElementById('timer-history-list');
    const timersActiveContainer = document.getElementById('timers-active-container');
    const activeTimersList = document.getElementById('active-timers-list');

    function buildPickers() {
      populateScroller('scroller-hours', 24, true); // 時間は一桁
      populateScroller('scroller-minutes', 60, false);
      populateScroller('scroller-seconds', 60, false);

      setTimeout(() => {
        setPickerIndex('col-hours', 0);
        setPickerIndex('col-minutes', 5);
        setPickerIndex('col-seconds', 0);
        recalcTimerParams();
      }, 50);
    }

    function populateScroller(scrollerId, limit, isHours = false) {
      const container = document.getElementById(scrollerId);
      container.innerHTML = '';
      for (let i = 0; i < limit; i++) {
        const item = document.createElement('div');
        item.className = 'picker-val-item';
        item.textContent = isHours ? String(i) : String(i).padStart(2, '0');
        container.appendChild(item);
      }
    }

    function setPickerIndex(colId, index) {
      const col = document.getElementById(colId);
      col.scrollTop = index * 40;
      updatePickerVisuals(col, index, colId === 'col-hours' ? '時間' : colId === 'col-minutes' ? '分' : '秒');
    }

    function onPickerScroll(col, type) {
      if (scrollDebounceTimer) clearTimeout(scrollDebounceTimer);
      
      const limit = col.firstElementChild.children.length;
      const index = Math.max(0, Math.min(limit - 1, Math.round(col.scrollTop / 40)));
      
      const unit = type === 'hours' ? '時間' : type === 'minutes' ? '分' : '秒';
      updatePickerVisuals(col, index, unit);

      if (type === 'hours') selHours = index;
      if (type === 'minutes') selMinutes = index;
      if (type === 'seconds') selSeconds = index;

      scrollDebounceTimer = setTimeout(() => {
        recalcTimerParams();
      }, 100);
    }

    function updatePickerVisuals(col, targetIdx, unit) {
      const items = col.querySelectorAll('.picker-val-item');
      const isHours = col.id === 'col-hours';
      items.forEach((item, idx) => {
        const numStr = isHours ? String(idx) : String(idx).padStart(2, '0');
        if (idx === targetIdx) {
          item.classList.add('active');
          // 単位（時間、分、秒）を数字の直後に美しく結合
          item.textContent = `${numStr} ${unit}`;
          item.style.fontWeight = '500';
          item.style.color = '#ffffff';
        } else {
          item.classList.remove('active');
          item.textContent = numStr;
          item.style.fontWeight = '300';
          item.style.color = '#8e8e93';
        }
      });
    }

    function recalcTimerParams() {
      totalSecs = (selHours * 3600) + (selMinutes * 60) + selSeconds;
      if (totalSecs <= 0) {
        tBtnStart.classList.add('opacity-40');
        tBtnStart.disabled = true;
      } else {
        tBtnStart.classList.remove('opacity-40');
        tBtnStart.disabled = false;
      }
    }

    tBtnStart.addEventListener('click', () => {
      initAudio();
      playHapticTick();
      if (totalSecs <= 0) return;

      const currentLabelValue = tLabelInput.value || "タイマー";
      addTimerInstance(totalSecs, currentLabelValue);
      
      registerHistoryEntry(totalSecs, currentLabelValue);

      tLabelInput.value = "タイマー";
      tLabelDisplay.textContent = "タイマー";
    });

    function addTimerInstance(seconds, label) {
      timerGlobalId++;
      const now = Date.now();
      const newTimer = {
        id: timerGlobalId,
        label: label,
        totalSecs: seconds,
        secsLeft: seconds,
        expectedFinishTime: now + (seconds * 1000),
        state: 'running' 
      };

      activeTimers.push(newTimer);
      updateTimerScreenLayout();
      startGlobalTimerTicker();
    }

    function updateTimerScreenLayout() {
      if (activeTimers.length === 0) {
        tPanelSetup.classList.remove('hidden');
        tPanelRunningSingle.classList.add('hidden');
        timersActiveContainer.classList.add('hidden');
      } else if (activeTimers.length === 1) {
        tPanelSetup.classList.add('hidden');
        tPanelRunningSingle.classList.remove('hidden');
        timersActiveContainer.classList.add('hidden');
        
        const single = activeTimers[0];
        document.getElementById('label-selected-sound-running').textContent = selectedSoundKey === 'radar' ? 'レーダー' : selectedSoundKey === 'chime' ? '美しいチャイム' : 'アップリフト';
        
        if (single.state === 'running') {
          tBtnPauseResume.textContent = "一時停止";
          tBtnPauseResume.className = "ios-btn btn-orange-pause";
        } else {
          tBtnPauseResume.textContent = "再開";
          tBtnPauseResume.className = "ios-btn btn-green-start";
        }
        
        refreshSingleTimerUI(single);
      } else {
        tPanelSetup.classList.remove('hidden'); 
        tPanelRunningSingle.classList.add('hidden'); 
        timersActiveContainer.classList.remove('hidden'); 
        renderActiveTimersList();
      }
    }

    function refreshSingleTimerUI(t) {
      const h = Math.floor(t.secsLeft / 3600);
      const m = Math.floor((t.secsLeft % 3600) / 60);
      const s = t.secsLeft % 60;

      let displayStr = "";
      if (h > 0) {
        displayStr = `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      } else {
        displayStr = `${m}:${String(s).padStart(2, '0')}`;
      }
      tCountdown.textContent = displayStr;

      const strokeDash = 659.7;
      const progress = t.secsLeft / t.totalSecs;
      tRing.style.strokeDashoffset = strokeDash * (1 - progress);

      const eta = new Date(t.expectedFinishTime);
      const etaStr = `${String(eta.getHours()).padStart(2, '0')}:${String(eta.getMinutes()).padStart(2, '0')}`;
      tEta.textContent = etaStr;

      const runningTitleElem = document.getElementById('timer-running-title');
      if (runningTitleElem) {
        runningTitleElem.textContent = t.label;
      }
    }

    function startGlobalTimerTicker() {
      if (timerTickerId) return;
      timerTickerId = setInterval(() => {
        const now = Date.now();
        let listChanged = false;

        activeTimers.forEach(t => {
          if (t.state === 'running') {
            const remaining = Math.ceil((t.expectedFinishTime - now) / 1000);
            t.secsLeft = Math.max(0, remaining);

            if (t.secsLeft <= 0) {
              t.state = 'completed';
              listChanged = true;
              executeAlarmAlertWithLabel(t.label);
            }
          }
        });

        const prevCount = activeTimers.length;
        activeTimers = activeTimers.filter(t => t.state !== 'completed');
        if (activeTimers.length !== prevCount) {
          listChanged = true;
        }

        if (activeTimers.length === 1) {
          refreshSingleTimerUI(activeTimers[0]);
        } else if (activeTimers.length > 1) {
          renderActiveTimersList();
        }

        if (listChanged) {
          updateTimerScreenLayout();
        }

        updateActivePiP();

        if (activeTimers.length === 0) {
          clearInterval(timerTickerId);
          timerTickerId = null;
          updateTimerScreenLayout();
        }
      }, 200);
    }

    function executeAlarmAlertWithLabel(label) {
      const alertOverlay = document.getElementById('overlay-alarm');
      document.getElementById('overlay-timer-label').textContent = label;
      alertOverlay.classList.remove('pointer-events-none', 'opacity-0');
      startLoopingAlertSound();
    }

    tBtnCancelActive.addEventListener('click', () => {
      playHapticTick();
      if (activeTimers.length === 1) {
        removeTimerInstance(activeTimers[0].id);
      }
    });

    tBtnPauseResume.addEventListener('click', () => {
      if (activeTimers.length === 1) {
        toggleTimerState(activeTimers[0].id);
        
        const single = activeTimers[0];
        if (single.state === 'running') {
          tBtnPauseResume.textContent = "一時停止";
          tBtnPauseResume.className = "ios-btn btn-orange-pause";
        } else {
          tBtnPauseResume.textContent = "再開";
          tBtnPauseResume.className = "ios-btn btn-green-start";
        }
      }
    });

    function renderActiveTimersList() {
      activeTimersList.innerHTML = '';
      activeTimers.forEach(t => {
        const h = Math.floor(t.secsLeft / 3600);
        const m = Math.floor((t.secsLeft % 3600) / 60);
        const s = t.secsLeft % 60;

        let displayStr = "";
        if (h > 0) {
          displayStr = `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        } else {
          displayStr = `${m}:${String(s).padStart(2, '0')}`;
        }

        const eta = new Date(t.expectedFinishTime);
        const etaStr = `${String(eta.getHours()).padStart(2, '0')}:${String(eta.getMinutes()).padStart(2, '0')}`;

        const progress = t.secsLeft / t.totalSecs;
        const offset = 113.1 * (1 - progress); 

        const row = document.createElement('div');
        row.className = "flex justify-between items-center bg-[#1c1c1e] p-3.5 rounded-xl border border-neutral-900";
        row.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="relative w-10 h-10 flex items-center justify-center">
              <svg class="absolute inset-0 w-full h-full" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18" fill="transparent" stroke="#2c2c2e" stroke-width="2"/>
                <circle cx="20" cy="20" r="18" fill="transparent" stroke="#ff9500" stroke-width="2.5" 
                  stroke-dasharray="113.1" stroke-dashoffset="${offset}" stroke-linecap="round" class="progress-ring-circle"/>
              </svg>
              <svg class="w-4.5 h-4.5 text-orange-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v2c-3 0-5 2.5-5 5v4.158c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            </div>
            <div>
              <div class="text-white font-medium text-base leading-tight">${t.label}</div>
              <div class="text-neutral-500 text-xs mt-0.5">${etaStr}に終了</div>
            </div>
          </div>

          <div class="flex items-center gap-2.5">
            <span class="text-2xl font-light tabular-timer text-neutral-100 mr-1">${displayStr}</span>
            <button onclick="toggleTimerState(${t.id})" class="w-9 h-9 rounded-full ${t.state === 'running' ? 'bg-[#331400]' : 'bg-[#153215]'} flex items-center justify-center transition-all duration-150">
              ${t.state === 'running' 
                ? '<svg class="w-4 h-4 text-orange-500" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>' 
                : '<svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>'}
            </button>
            <button onclick="removeTimerInstance(${t.id})" class="w-9 h-9 rounded-full bg-[#2c2c2e] flex items-center justify-center transition-all">
              <svg class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        `;
        activeTimersList.appendChild(row);
      });
    }

    window.toggleTimerState = function(id) {
      playHapticTick();
      const t = activeTimers.find(x => x.id === id);
      if (!t) return;

      if (t.state === 'running') {
        t.state = 'paused';
        t.pausedAt = Date.now();
      } else {
        t.state = 'running';
        const pausedDuration = Date.now() - t.pausedAt;
        t.expectedFinishTime += pausedDuration;
      }
      updateTimerScreenLayout();
    };

    window.removeTimerInstance = function(id) {
      playHapticTick();
      activeTimers = activeTimers.filter(x => x.id !== id);
      
      if (activeTimers.length === 0) {
        if (document.pictureInPictureElement) {
          document.exitPictureInPicture().catch(console.warn);
        }
      }
      updateTimerScreenLayout();
    };

    function registerHistoryEntry(seconds, label) {
      recentTimersList = recentTimersList.filter(item => item.seconds !== seconds);
      recentTimersList.unshift({ seconds, label: label || "タイマー" });
      if (recentTimersList.length > 5) recentTimersList.pop();

      localStorage.setItem('ios_timer_recent_history', JSON.stringify(recentTimersList));
      drawHistoryPills();
    }

    function retrieveHistory() {
      const raw = localStorage.getItem('ios_timer_recent_history');
      if (raw) {
        try { recentTimersList = JSON.parse(raw); } catch (e) { recentTimersList = []; }
      } else {
        recentTimersList = []; 
      }
      drawHistoryPills();
    }

    function drawHistoryPills() {
      tHistoryList.innerHTML = '';
      if (recentTimersList.length === 0) {
        tHistoryList.innerHTML = `<div class="text-neutral-600 text-sm py-1 font-normal tracking-wide pl-1">履歴はありません</div>`;
        return;
      }
      recentTimersList.forEach(item => {
        const h = Math.floor(item.seconds / 3600);
        const m = Math.floor((item.seconds % 3600) / 60);
        const s = item.seconds % 60;

        let timeStr = "";
        if (h > 0) timeStr += `${h}時間`;
        if (m > 0) timeStr += `${m}分`;
        if (s > 0 || (h === 0 && m === 0)) timeStr += `${s}秒`;

        const chip = document.createElement('button');
        chip.className = 'flex-shrink-0 bg-[#1c1c1e] hover:bg-[#2c2c2e] active:scale-95 px-4 py-2 rounded-full text-xs text-neutral-200 transition-all duration-150 flex items-center gap-1.5 border border-neutral-900';
        chip.innerHTML = `<span class="font-semibold text-white">${timeStr}</span><span class="text-neutral-400 font-normal">(${item.label})</span>`;
        
        chip.style.outline = "none";
        chip.addEventListener('click', () => {
          initAudio();
          playHapticTick();
          
          setPickerIndex('col-hours', h);
          setPickerIndex('col-minutes', m);
          setPickerIndex('col-seconds', s);
          tLabelInput.value = item.label;
          tLabelDisplay.textContent = item.label;
          selHours = h;
          selMinutes = m;
          selSeconds = s;
          recalcTimerParams();

          setTimeout(() => {
            addTimerInstance(item.seconds, item.label);
          }, 150);
        });
        tHistoryList.appendChild(chip);
      });
    }

    // ================= PICTURE-IN-PICTURE (極上PiPデザインウィジェット) =================
    const pipCanvas = document.getElementById('pip-canvas');
    const pipCtx = pipCanvas.getContext('2d');
    const pipVideo = document.getElementById('pip-video');
    const btnPip = document.getElementById('btn-pip');
    let pipStream = null;

    function getPriorityTimer() {
      if (activeTimers.length === 0) return null;
      const running = activeTimers.filter(t => t.state === 'running');
      if (running.length > 0) {
        return running.reduce((min, t) => t.secsLeft < min.secsLeft ? t : min, running[0]);
      }
      return activeTimers[0]; 
    }

    function drawPipCanvas() {
      if (!pipCtx) return;

      const currentTimer = getPriorityTimer();

      pipCtx.fillStyle = '#000000';
      pipCtx.fillRect(0, 0, 600, 600);

      if (!currentTimer) {
        pipCtx.fillStyle = '#8e8e93';
        pipCtx.textAlign = 'center';
        pipCtx.textBaseline = 'middle';
        pipCtx.font = 'bold 36px sans-serif';
        pipCtx.fillText('タイマーは停止中', 300, 300);
        return;
      }

      const cx = 300;
      const cy = 300;
      const radius = 230;

      // 1. 円形レール (極細スタイリッシュ仕様)
      pipCtx.beginPath();
      pipCtx.arc(cx, cy, radius, 0, 2 * Math.PI);
      pipCtx.strokeStyle = '#1c1c1e';
      pipCtx.lineWidth = 4;
      pipCtx.stroke();

      // 2. グラデーションサークル
      if (currentTimer.totalSecs > 0) {
        const progress = currentTimer.secsLeft / currentTimer.totalSecs;
        const startAngle = -0.5 * Math.PI;
        const endAngle = startAngle + (2 * Math.PI * progress);
        
        pipCtx.beginPath();
        pipCtx.arc(cx, cy, radius, startAngle, endAngle);
        pipCtx.strokeStyle = '#ff9500';
        pipCtx.lineWidth = 6;
        pipCtx.lineCap = 'round';
        pipCtx.stroke();
      }

      // 3. 残り時間を描画 (極細 Inter フォントをPiP内にも美しく同期)
      const h = Math.floor(currentTimer.secsLeft / 3600);
      const m = Math.floor((currentTimer.secsLeft % 3600) / 60);
      const s = currentTimer.secsLeft % 60;

      let displayStr = "";
      if (h > 0) {
        displayStr = `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      } else {
        displayStr = `${m}:${String(s).padStart(2, '0')}`;
      }

      pipCtx.fillStyle = '#ffffff';
      pipCtx.textAlign = 'center';
      pipCtx.textBaseline = 'middle';
      
      if (h > 0) {
        pipCtx.font = '100 110px "Inter", -apple-system, sans-serif';
      } else {
        pipCtx.font = '100 140px "Inter", -apple-system, sans-serif';
      }
      
      pipCtx.fillText(displayStr, cx, cy - 20);

      pipCtx.fillStyle = '#8e8e93';
      pipCtx.font = '400 32px "Inter", -apple-system, sans-serif';
      pipCtx.fillText(currentTimer.label, cx, cy + 75);

      const eta = new Date(currentTimer.expectedFinishTime);
      const etaStr = `${String(eta.getHours()).padStart(2, '0')}:${String(eta.getMinutes()).padStart(2, '0')}`;
      pipCtx.fillStyle = '#ff9500';
      pipCtx.font = '400 24px "Inter", -apple-system, sans-serif';
      pipCtx.fillText(`🔔 ${etaStr}`, cx, cy + 130);
    }

    function updateActivePiP() {
      drawPipCanvas();
    }

    async function triggerPictureInPicture() {
      initAudio();
      playHapticTick();

      if (activeTimers.length === 0) {
        alert("タイマーを開始してから「小窓で表示 (PiP)」を押してください。");
        return;
      }

      const currentTimer = getPriorityTimer();
      if (!currentTimer) return;

      if (window.documentPictureInPicture) {
        try {
          const pipWindow = await window.documentPictureInPicture.requestWindow({
            width: 320,
            height: 300,
          });

          document.querySelectorAll('style, link[rel="stylesheet"]').forEach((style) => {
            pipWindow.document.head.appendChild(style.cloneNode(true));
          });
          
          const fontLink = document.createElement('link');
          fontLink.rel = 'stylesheet';
          fontLink.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap';
          pipWindow.document.head.appendChild(fontLink);

          pipWindow.document.body.innerHTML = `
            <div style="background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;">
              <div style="text-align: center;">
                <div id="pip-label" style="color: #ff9500; font-size: 20px; font-weight: 500; margin-bottom: 8px;">${currentTimer.label}</div>
                <div id="pip-time" class="tabular-timer" style="font-size: 72px; font-weight: 100; letter-spacing: -0.05em; line-height: 1;">0:00</div>
                <div id="pip-eta" style="color: #8e8e93; font-size: 14px; margin-top: 10px;">終了予定 --:--</div>
              </div>
            </div>
          `;

          const style = document.createElement('style');
          style.textContent = `
            body { background: #000000; margin: 0; padding: 0; overflow: hidden; }
            .tabular-timer { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" on; }
          `;
          pipWindow.document.head.appendChild(style);

          const intervalId = setInterval(() => {
            if (pipWindow.closed) {
              clearInterval(intervalId);
              return;
            }
            const active = getPriorityTimer();
            if (!active) return;

            const h = Math.floor(active.secsLeft / 3600);
            const m = Math.floor((active.secsLeft % 3600) / 60);
            const s = active.secsLeft % 60;
            let displayStr = h > 0 ? `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}` : `${m}:${String(s).padStart(2, '0')}`;

            const timeElem = pipWindow.document.getElementById('pip-time');
            const labelElem = pipWindow.document.getElementById('pip-label');
            const etaElem = pipWindow.document.getElementById('pip-eta');

            if (timeElem) timeElem.textContent = displayStr;
            if (labelElem) labelElem.textContent = active.label;
            if (etaElem) {
              const eta = new Date(active.expectedFinishTime);
              etaElem.textContent = `終了予定 ${String(eta.getHours()).padStart(2, '0')}:${String(eta.getMinutes()).padStart(2, '0')}`;
            }
          }, 200);

          pipWindow.addEventListener('pagehide', () => {
            clearInterval(intervalId);
          });

          return;
        } catch (err) {
          console.warn("Document PiP failed, falling back to Video PiP:", err);
        }
      }

      const hasStandardPiP = ('pictureInPictureEnabled' in document && document.pictureInPictureEnabled) || typeof pipVideo.requestPictureInPicture === 'function';
      const hasWebKitPiP = typeof pipVideo.webkitSetPresentationMode === 'function';

      if (!hasStandardPiP && !hasWebKitPiP) {
        alert("お使いのWebブラウザはPicture-in-Picture機能に対応していません。SafariかChromeの最新版をご利用ください。");
        return;
      }

      try {
        if (!pipStream) {
          pipStream = pipCanvas.captureStream(20);
          pipVideo.srcObject = pipStream;
        }
        await pipVideo.play();

        if (hasStandardPiP) {
          await pipVideo.requestPictureInPicture();
        } else if (hasWebKitPiP) {
          pipVideo.webkitSetPresentationMode("picture-in-picture");
        }
      } catch (err) {
        console.error("Video PiP failed:", err);
        try {
          if (pipVideo.webkitSetPresentationMode) {
            pipVideo.webkitSetPresentationMode("picture-in-picture");
          }
        } catch (e) {
          console.error("All PiP methods failed:", e);
        }
      }
    }

    btnPip.addEventListener('click', triggerPictureInPicture);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden' && activeTimers.some(t => t.state === 'running')) {
        triggerPictureInPicture().catch(() => {});
      }
    });

    // ================= STOPWATCH CONTROLLER =================
    let swState = 'idle'; 
    let swStartTime = 0;
    let swElapsedTime = 0;
    let swRenderFrameId = null; 
    let swLaps = [];
    let swDisplayMode = 'digital'; 

    const swMainDisp = document.getElementById('sw-time-main');
    const swMsDisp = document.getElementById('sw-time-ms');
    const swBtnLap = document.getElementById('sw-btn-lap');
    const swBtnPrimary = document.getElementById('sw-btn-primary');
    const swLapsTable = document.getElementById('sw-laps-table');

    function toggleStopwatchDisplayMode() {
      playHapticTick();
      if (swDisplayMode === 'digital') {
        swDisplayMode = 'analog';
        document.getElementById('sw-digital-face').classList.add('hidden');
        document.getElementById('sw-analog-face').classList.remove('hidden');
      } else {
        swDisplayMode = 'digital';
        document.getElementById('sw-analog-face').classList.add('hidden');
        document.getElementById('sw-digital-face').classList.remove('hidden');
      }
      updateStopwatchTimer(); 
    }

    function updateStopwatchTimer() {
      let delta = swElapsedTime;
      if (swState === 'running') {
        delta += Date.now() - swStartTime;
      }

      const mins = Math.floor(delta / 60000);
      const secs = Math.floor((delta % 60000) / 1000);
      const ms = Math.floor((delta % 1000) / 10);

      const minsStr = String(mins).padStart(2, '0');
      const secsStr = String(secs).padStart(2, '0');
      const msStr = String(ms).padStart(2, '0');

      if (swDisplayMode === 'digital') {
        swMainDisp.textContent = `${minsStr}:${secsStr}.`;
        swMsDisp.textContent = msStr;
      }

      if (swDisplayMode === 'analog') {
        const secsAngle = ((delta % 60000) / 1000) * 6; 
        const minsAngle = ((delta % 1800000) / 60000) * 12; 

        const secondsHandGroup = document.getElementById('svg-hand-seconds-group');
        const minutesHand = document.getElementById('svg-hand-sub-minutes');
        
        if (secondsHandGroup) secondsHandGroup.setAttribute('transform', `rotate(${secsAngle}, 100, 100)`);
        if (minutesHand) minutesHand.setAttribute('transform', `rotate(${minsAngle}, 100, 62)`);
      }
    }

    function startSwRenderLoop() {
      if (swRenderFrameId) cancelAnimationFrame(swRenderFrameId);
      function render() {
        updateStopwatchTimer();
        if (swState === 'running') {
          swRenderFrameId = requestAnimationFrame(render);
        }
      }
      swRenderFrameId = requestAnimationFrame(render);
    }

    function stopSwRenderLoop() {
      if (swRenderFrameId) {
        cancelAnimationFrame(swRenderFrameId);
        swRenderFrameId = null;
      }
    }

    function swStart() {
      initAudio();
      playHapticTick();
      swState = 'running';
      swStartTime = Date.now();
      
      swBtnPrimary.textContent = "停止";
      swBtnPrimary.className = "ios-btn btn-red-stop";

      swBtnLap.textContent = "ラップ";
      swBtnLap.disabled = false;
      swBtnLap.className = "ios-btn btn-gray-active";

      startSwRenderLoop(); 
    }

    function swStop() {
      playHapticTick();
      swState = 'paused';
      stopSwRenderLoop();
      swElapsedTime += Date.now() - swStartTime;

      swBtnPrimary.textContent = "開始";
      swBtnPrimary.className = "ios-btn btn-green-start";

      swBtnLap.textContent = "リセット";
      updateStopwatchTimer(); 
    }

    function swReset() {
      playHapticTick();
      swState = 'idle';
      stopSwRenderLoop();
      swStartTime = 0;
      swElapsedTime = 0;
      swLaps = [];

      swMainDisp.textContent = "00:00.";
      swMsDisp.textContent = "00";

      const secondsHandGroup = document.getElementById('svg-hand-seconds-group');
      const minutesHand = document.getElementById('svg-hand-sub-minutes');
      if (secondsHandGroup) secondsHandGroup.setAttribute('transform', 'rotate(0, 100, 100)');
      if (minutesHand) minutesHand.setAttribute('transform', 'rotate(0, 100, 62)');

      swBtnPrimary.textContent = "開始";
      swBtnPrimary.className = "ios-btn btn-green-start";

      swBtnLap.textContent = "ラップ";
      swBtnLap.disabled = true;
      swBtnLap.className = "ios-btn btn-gray-disabled";

      swLapsTable.innerHTML = '';
    }

    function swLap() {
      playHapticTick();
      const now = Date.now();
      const currentTotal = now - swStartTime + swElapsedTime;
      
      let lapDelta = currentTotal;
      if (swLaps.length > 0) {
        const prevTotal = swLaps[0].totalTime; 
        lapDelta = currentTotal - prevTotal;
      }

      const lapNumber = swLaps.length + 1;
      swLaps.unshift({
        num: lapNumber,
        lapTime: lapDelta,
        totalTime: currentTotal 
      });

      renderLaps();
    }

    function renderLaps() {
      swLapsTable.innerHTML = '';
      if (swLaps.length === 0) return;

      let minIdx = -1;
      let maxIdx = -1;
      let minVal = Infinity;
      let maxVal = -Infinity;

      if (swLaps.length > 1) {
        swLaps.forEach((lap, idx) => {
          if (lap.lapTime < minVal) {
            minVal = lap.lapTime;
            minIdx = idx;
          }
          if (lap.lapTime > maxVal) {
            maxVal = lap.lapTime;
            maxIdx = idx;
          }
        });
      }

      swLaps.forEach((lap, idx) => {
        const formatted = formatMsToTimeStr(lap.lapTime);
        const row = document.createElement('div');
        row.className = 'flex justify-between items-center py-3.5 px-4 font-normal text-white border-b border-neutral-950';

        let textColorClass = 'text-white';
        if (idx === minIdx) textColorClass = 'text-[#30d158]'; 
        if (idx === maxIdx) textColorClass = 'text-[#ff3b30]'; 

        row.innerHTML = `
          <span class="${textColorClass}">ラップ ${lap.num}</span>
          <span class="tabular-timer font-medium ${textColorClass}">${formatted}</span>
        `;
        swLapsTable.appendChild(row);
      });
    }

    function formatMsToTimeStr(duration) {
      const mins = Math.floor(duration / 60000);
      const secs = Math.floor((duration % 60000) / 1000);
      const ms = Math.floor((duration % 1000) / 10);
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
    }

    swBtnPrimary.addEventListener('click', () => {
      if (swState === 'running') swStop();
      else swStart();
    });

    swBtnLap.addEventListener('click', () => {
      if (swState === 'running') swLap();
      else if (swState === 'paused') swReset();
    });

    // ================= LABEL OPTIONS SHEET =================
    function openLabelMenu(event) {
      if (event) {
        event.stopPropagation();
        event.preventDefault();
      }
      playHapticTick();
      const modal = document.getElementById('modal-label');
      const inner = modal.querySelector('div');
      modal.classList.remove('pointer-events-none', 'opacity-0');
      inner.classList.remove('translate-y-full');
      
      setTimeout(() => {
        tLabelInput.focus();
        tLabelInput.select();
      }, 200);
    }

    function closeLabelMenu() {
      playHapticTick();
      const modal = document.getElementById('modal-label');
      const inner = modal.querySelector('div');
      modal.classList.add('opacity-0', 'pointer-events-none');
      inner.classList.add('translate-y-full');

      const updatedVal = tLabelInput.value.trim() || "タイマー";
      tLabelInput.value = updatedVal;
      tLabelDisplay.textContent = updatedVal;

      tLabelInput.blur(); 
    }

    document.getElementById('input-timer-label').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') closeLabelMenu();
    });

    // ================= SOUND OPTIONS SHEET =================
    function openSoundMenu(event) {
      if (event) {
        event.stopPropagation();
        event.preventDefault();
      }
      playHapticTick();
      const modal = document.getElementById('modal-sound');
      const inner = modal.querySelector('div');
      modal.classList.remove('pointer-events-none', 'opacity-0');
      inner.classList.remove('translate-y-full');
      renderSoundSelections();
    }

    function closeSoundMenu(event) {
      if (event) {
        event.stopPropagation();
        event.preventDefault();
      }
      playHapticTick();
      const modal = document.getElementById('modal-sound');
      const inner = modal.querySelector('div');
      modal.classList.add('opacity-0', 'pointer-events-none');
      inner.classList.add('translate-y-full');
    }

    function renderSoundSelections() {
      const container = document.getElementById('sound-options-list');
      container.innerHTML = '';

      Object.keys(INSTRUMENT_SOUNDS).forEach(key => {
        const isCurrent = key === selectedSoundKey;
        const opt = document.createElement('div');
        opt.className = `flex justify-between items-center p-3.5 rounded-xl cursor-pointer ${isCurrent ? 'bg-orange-950/20 text-orange-500' : 'text-neutral-200 hover:bg-neutral-800'}`;
        opt.innerHTML = `
          <span class="text-base font-normal">${INSTRUMENT_SOUNDS[key].name}</span>
          ${isCurrent ? '<svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' : ''}
        `;
        opt.onclick = (e) => {
          e.stopPropagation();
          playHapticTick();
          selectedSoundKey = key;
          document.getElementById('label-selected-sound').textContent = INSTRUMENT_SOUNDS[key].name;
          const labelRunning = document.getElementById('label-selected-sound-running');
          if (labelRunning) labelRunning.textContent = INSTRUMENT_SOUNDS[key].name;
          INSTRUMENT_SOUNDS[key].play(); 
          renderSoundSelections();
        };
        container.appendChild(opt);
      });
    }

    // ================= SYSTEM INITIALIZATION =================
    window.onload = function() {
      buildPickers();
      retrieveHistory();
      swReset(); 
      startWorldClockUpdate();
      
      document.body.addEventListener('click', () => {
        initAudio();
      }, { once: true });
    };

    // 繰り返し曜日設定のボタントグル設定
    document.querySelectorAll('.alarm-day-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        playHapticTick();
        const dayIdx = parseInt(btn.getAttribute('data-day'));
        selectedAlarmDays[dayIdx] = !selectedAlarmDays[dayIdx];
        
        if (selectedAlarmDays[dayIdx]) {
          btn.classList.remove('bg-[#2c2c2e]', 'text-neutral-300');
          btn.classList.add('bg-orange-500', 'text-white');
        } else {
          btn.classList.remove('bg-orange-500', 'text-white');
          btn.classList.add('bg-[#2c2c2e]', 'text-neutral-300');
        }
      });
    });
  </script>

  <!-- PWA Install Handling -->
  <script>
    let deferredInstallPrompt;
    const pwaButton = document.getElementById('pwa-install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      pwaButton.classList.remove('hidden');
    });

    pwaButton.addEventListener('click', async () => {
      playHapticTick();
      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        const { outcome } = await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        pwaButton.classList.add('hidden');
      } else {
        alert("Safariブラウザ下部の「共有ボタン（↑）」から「ホーム画面に追加」を実行してインストールしてください。");
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('PWA Service Worker registered:', reg.scope))
          .catch(err => console.log('PWA Service Worker registration error:', err));
      });
    }
  </script>
